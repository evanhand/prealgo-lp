# prealgo.com is served by this Next.js LP. The Vite dashboard app lives on
# a separate Netlify site and is proxied for /dashboard, /login, /signup,
# /upload, /analysis, /onboarding, /settings, /history, /progress, /admin.
#
# IMPORTANT: replace VITE_APP_URL placeholders below with the actual Netlify
# subdomain of the dashboard repo (e.g. https://prealgo-app.netlify.app)
# before deploying. The dashboard repo is `~/prealgo` on local; deploy it
# as a separate Netlify site first and paste its URL here.

[build]
command = "npm run build"
publish = "out"

[build.environment]
NODE_VERSION = "20"

# Vite app static assets (JS/CSS bundles loaded by proxied app pages)
[[redirects]]
from = "/assets/*"
to = "https://superb-salamander-7c2a41.netlify.app/assets/:splat"
status = 200

# Auth + onboarding routes
[[redirects]]
from = "/login"
to = "https://superb-salamander-7c2a41.netlify.app/login"
status = 200

[[redirects]]
from = "/signup"
to = "https://superb-salamander-7c2a41.netlify.app/signup"
status = 200

[[redirects]]
from = "/forgot-password"
to = "https://superb-salamander-7c2a41.netlify.app/forgot-password"
status = 200

[[redirects]]
from = "/reset-password"
to = "https://superb-salamander-7c2a41.netlify.app/reset-password"
status = 200

[[redirects]]
from = "/onboarding"
to = "https://superb-salamander-7c2a41.netlify.app/onboarding"
status = 200

# Dashboard + product routes
[[redirects]]
from = "/dashboard/*"
to = "https://superb-salamander-7c2a41.netlify.app/dashboard/:splat"
status = 200

[[redirects]]
from = "/upload"
to = "https://superb-salamander-7c2a41.netlify.app/upload"
status = 200

[[redirects]]
from = "/analysis/*"
to = "https://superb-salamander-7c2a41.netlify.app/analysis/:splat"
status = 200

[[redirects]]
from = "/shared/*"
to = "https://superb-salamander-7c2a41.netlify.app/shared/:splat"
status = 200

[[redirects]]
from = "/history"
to = "https://superb-salamander-7c2a41.netlify.app/history"
status = 200

[[redirects]]
from = "/progress"
to = "https://superb-salamander-7c2a41.netlify.app/progress"
status = 200

[[redirects]]
from = "/settings"
to = "https://superb-salamander-7c2a41.netlify.app/settings"
status = 200

[[redirects]]
from = "/billing"
to = "https://superb-salamander-7c2a41.netlify.app/billing"
status = 200

[[redirects]]
from = "/checkout-success"
to = "https://superb-salamander-7c2a41.netlify.app/checkout-success"
status = 200

[[redirects]]
from = "/admin/*"
to = "https://superb-salamander-7c2a41.netlify.app/admin/:splat"
status = 200

# Cache hashed Next.js assets forever (content-hashed filenames)
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache public images for 1 year
[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=31536000"
